# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/trade_ai?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none

# Database Initialization from schema.sql & seed_data.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed_data.sql
spring.sql.init.continue-on-error=true

# JWT Security Configuration
jwt.secret=40b2e88a2e57bb67c3b28b7eefcfad49a60e0a5bb9910d54fcfad96a60e0a5bb
jwt.expiration=86400000

# AI Service Config (Python FastAPI Endpoint)
ai-service.url=http://localhost:8000

# WebSocket Message Size and Buffering Config
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
